# Fly.io deployment config for the Rho umbrella.
#
# Database: external Neon Postgres (no volume needed).
# Required secrets (set via `just set-secrets`):
#   - NEON_URL (or DATABASE_URL)
#   - SECRET_KEY_BASE
#   - LLM provider keys (OPENAI_API_KEY, OPENROUTER_API_KEY, ...)
#
# First-time setup:
#   fly apps create rho
#   just set-secrets
#   just deploy
#   just migrate

app = "rho"
primary_region = "sin"

[build]

[env]
  PHX_HOST = "rho.fly.dev"
  PORT = "8080"
  # Fly's internal proxy → app hop is IPv6-only; runtime.exs binds to ::.
  ELIXIR_ERL_OPTIONS = "+fnu"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale-to-zero is safe with Neon — no local state on the machine.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
